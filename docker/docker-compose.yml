# Reftrix Development Docker Compose
# Port offset: 21000 (e.g., PostgreSQL: 26432, Prisma Studio: 26555)

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg18
    container_name: reftrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reftrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-reftrix}
    ports:
      - "26432:5432"
    volumes:
      # PostgreSQL 18+ requires mounting at /var/lib/postgresql (not /data subdirectory)
      - reftrix_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reftrix -d reftrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reftrix-network

  # Redis for BullMQ job queue (required for page.analyze async mode)
  redis:
    image: redis:7-alpine
    container_name: reftrix-redis
    restart: unless-stopped
    ports:
      - "27379:6379"
    volumes:
      - reftrix_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reftrix-network

  # ===== Manual Backup (pg_dump / pg_restore) =====
  # pg_dump -h localhost -p 26432 -U reftrix -Fc reftrix > backup.dump
  # pg_restore -h localhost -p 26432 -U reftrix -d reftrix --clean backup.dump

  # ===== GPU Inference (Optional) =====
  # Uncomment the following to enable NVIDIA GPU acceleration for ONNX embedding inference.
  # Requires: NVIDIA Container Toolkit (nvidia-container-toolkit) installed on the host.
  # See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  #
  # mcp-server-gpu:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: reftrix-mcp-gpu
  #   restart: unless-stopped
  #   environment:
  #     ONNX_EXECUTION_PROVIDER: cuda
  #     DATABASE_URL: postgresql://reftrix:change_me@postgres:5432/reftrix?schema=public
  #     REDIS_URL: redis://redis:6379
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - reftrix-network

volumes:
  reftrix_postgres_data:
    driver: local
  reftrix_redis_data:
    driver: local

networks:
  reftrix-network:
    driver: bridge
