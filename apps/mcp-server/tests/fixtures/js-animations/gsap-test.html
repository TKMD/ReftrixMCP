<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Animation Test</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background: red;
      margin: 20px;
    }
    .circle {
      width: 50px;
      height: 50px;
      background: blue;
      border-radius: 50%;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div id="box" class="box"></div>
  <div id="circle" class="circle"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // GSAP tween animation
    gsap.to("#box", {
      x: 200,
      duration: 1,
      ease: "power2.inOut"
    });

    // GSAP timeline animation
    const tl = gsap.timeline({ repeat: -1 });
    tl.to("#circle", { scale: 1.5, duration: 0.5 })
      .to("#circle", { scale: 1, duration: 0.5 });
  </script>
</body>
</html>
