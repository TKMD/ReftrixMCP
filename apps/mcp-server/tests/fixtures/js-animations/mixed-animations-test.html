<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixed Animation Libraries Test</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      margin: 10px;
    }
    .css-animated {
      background: red;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .wapi-animated {
      background: green;
    }
    .gsap-animated {
      background: blue;
    }
    .raf-animated {
      background: purple;
    }
  </style>
</head>
<body>
  <div id="cssBox" class="box css-animated">CSS Animation</div>
  <div id="wapiBox" class="box wapi-animated">Web Animations API</div>
  <div id="gsapBox" class="box gsap-animated">GSAP</div>
  <div id="rafBox" class="box raf-animated">RAF Animation</div>

  <script>
    // Web Animations API
    document.getElementById('wapiBox').animate(
      [{ opacity: 0.5 }, { opacity: 1 }],
      { duration: 1000, iterations: Infinity, direction: 'alternate' }
    );

    // Simulated GSAP
    window.gsap = {
      version: '3.12.2',
      to: function(target, vars) {
        console.log('GSAP tween:', target, vars);
        return { kill: () => {} };
      },
      timeline: function() {
        return {
          to: function() { return this; },
          from: function() { return this; },
          play: function() { return this; },
          pause: function() { return this; }
        };
      }
    };

    window.gsap.to('#gsapBox', { x: 100, duration: 1, repeat: -1, yoyo: true });

    // requestAnimationFrame animation
    const rafBox = document.getElementById('rafBox');
    let rotation = 0;
    function animateWithRAF() {
      rotation += 1;
      rafBox.style.transform = `rotate(${rotation}deg)`;
      requestAnimationFrame(animateWithRAF);
    }
    requestAnimationFrame(animateWithRAF);
  </script>
</body>
</html>
