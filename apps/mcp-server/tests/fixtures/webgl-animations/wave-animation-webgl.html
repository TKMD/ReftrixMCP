<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Animation WebGL Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a1a;
    }
    #webgl-canvas {
      width: 600px;
      height: 300px;
    }
  </style>
</head>
<body>
  <canvas id="webgl-canvas" width="600" height="300"></canvas>
  <script>
    /**
     * 波形アニメーションWebGLテスト
     * - カテゴリ: wave
     * - 複数の正弦波が合成されたアニメーション
     */
    const canvas = document.getElementById('webgl-canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

    if (!gl) {
      console.error('WebGL not supported');
    } else {
      const vertexShaderSource = `
        attribute vec2 aPosition;
        void main() {
          gl_Position = vec4(aPosition, 0.0, 1.0);
        }
      `;

      const fragmentShaderSource = `
        precision mediump float;
        uniform float uTime;
        uniform vec2 uResolution;

        void main() {
          vec2 uv = gl_FragCoord.xy / uResolution.xy;

          // 複数の波を合成
          float wave1 = sin(uv.x * 10.0 + uTime * 2.0) * 0.1;
          float wave2 = sin(uv.x * 20.0 - uTime * 3.0) * 0.05;
          float wave3 = sin(uv.x * 5.0 + uTime * 1.5) * 0.15;

          float totalWave = wave1 + wave2 + wave3;
          float line = smoothstep(0.02, 0.0, abs(uv.y - 0.5 - totalWave));

          vec3 color = vec3(0.3, 0.6, 0.9) * line;
          color += vec3(0.1, 0.2, 0.3) * (1.0 - abs(uv.y - 0.5) * 2.0);

          gl_FragColor = vec4(color, 1.0);
        }
      `;

      function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
      }

      const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
      const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      gl.useProgram(program);

      // フルスクリーン四角形
      const vertices = new Float32Array([
        -1, -1,
         1, -1,
        -1,  1,
         1,  1,
      ]);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

      const positionLocation = gl.getAttribLocation(program, 'aPosition');
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

      const timeLocation = gl.getUniformLocation(program, 'uTime');
      const resolutionLocation = gl.getUniformLocation(program, 'uResolution');

      let startTime = Date.now();

      function render() {
        const elapsed = (Date.now() - startTime) / 1000;

        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.uniform1f(timeLocation, elapsed);
        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        requestAnimationFrame(render);
      }

      render();
    }
  </script>
</body>
</html>
