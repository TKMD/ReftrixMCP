<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle System WebGL Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #000;
    }
    #webgl-canvas {
      width: 500px;
      height: 400px;
    }
  </style>
</head>
<body>
  <canvas id="webgl-canvas" width="500" height="400"></canvas>
  <script>
    /**
     * パーティクルシステムWebGLアニメーション
     * - カテゴリ: particle
     * - 複数のパーティクルが動き回るアニメーション
     */
    const canvas = document.getElementById('webgl-canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

    if (!gl) {
      console.error('WebGL not supported');
    } else {
      // シェーダー
      const vertexShaderSource = `
        attribute vec2 aPosition;
        attribute float aSize;
        attribute vec4 aColor;
        varying vec4 vColor;
        void main() {
          gl_Position = vec4(aPosition, 0.0, 1.0);
          gl_PointSize = aSize;
          vColor = aColor;
        }
      `;

      const fragmentShaderSource = `
        precision mediump float;
        varying vec4 vColor;
        void main() {
          // 円形パーティクル
          vec2 coord = gl_PointCoord - vec2(0.5);
          float dist = length(coord);
          if (dist > 0.5) discard;
          gl_FragColor = vColor * (1.0 - dist * 2.0);
        }
      `;

      function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
      }

      const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
      const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      gl.useProgram(program);

      // パーティクルデータ
      const PARTICLE_COUNT = 100;
      const particles = [];

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: (Math.random() - 0.5) * 2,
          y: (Math.random() - 0.5) * 2,
          vx: (Math.random() - 0.5) * 0.02,
          vy: (Math.random() - 0.5) * 0.02,
          size: Math.random() * 10 + 5,
          r: Math.random(),
          g: Math.random(),
          b: Math.random(),
        });
      }

      const positionBuffer = gl.createBuffer();
      const sizeBuffer = gl.createBuffer();
      const colorBuffer = gl.createBuffer();

      const positionLocation = gl.getAttribLocation(program, 'aPosition');
      const sizeLocation = gl.getAttribLocation(program, 'aSize');
      const colorLocation = gl.getAttribLocation(program, 'aColor');

      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

      function render() {
        // パーティクル位置更新
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          // 境界で反射
          if (p.x > 1 || p.x < -1) p.vx *= -1;
          if (p.y > 1 || p.y < -1) p.vy *= -1;
        }

        // バッファデータ更新
        const positions = new Float32Array(particles.flatMap(p => [p.x, p.y]));
        const sizes = new Float32Array(particles.map(p => p.size));
        const colors = new Float32Array(particles.flatMap(p => [p.r, p.g, p.b, 0.8]));

        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);

        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, sizes, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(sizeLocation);
        gl.vertexAttribPointer(sizeLocation, 1, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, colors, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(colorLocation);
        gl.vertexAttribPointer(colorLocation, 4, gl.FLOAT, false, 0, 0);

        gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);

        requestAnimationFrame(render);
      }

      render();
    }
  </script>
</body>
</html>
